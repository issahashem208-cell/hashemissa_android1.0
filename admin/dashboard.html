<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لوحة التحكم · Hashim Android</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0d10;
            color: #f0f2f5;
            font-family: 'Inter', sans-serif;
            padding: 24px;
        }
        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .admin-header h1 { font-size: 1.6rem; font-weight: 600; }
        .admin-header h1 i { color: #6c8cff; margin-right: 10px; }
        .admin-header .badge {
            background: rgba(108,140,255,0.15);
            padding: 6px 18px;
            border-radius: 60px;
            font-size: 0.8rem;
            color: #6c8cff;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .stat-card {
            background: rgba(30,34,40,0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 22px;
            text-align: center;
        }
        .stat-card .number {
            font-size: 2.2rem;
            font-weight: 700;
            color: #6c8cff;
        }
        .stat-card .label {
            color: #a0a8b4;
            font-size: 0.85rem;
            margin-top: 4px;
        }
        .admin-section {
            margin: 30px 0;
            background: rgba(30,34,40,0.3);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.03);
        }
        .admin-section h2 {
            font-size: 1.2rem;
            margin-bottom: 16px;
        }
        .admin-section h2 i { color: #6c8cff; margin-right: 8px; }
        .app-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .app-list-item:last-child { border-bottom: none; }
        .app-list-item .app-info { display: flex; align-items: center; gap: 14px; }
        .app-list-item .app-info i { font-size: 1.4rem; color: #6c8cff; width: 30px; }
        .app-actions button {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            color: #a0a8b4;
            padding: 4px 14px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
            margin-left: 6px;
        }
        .app-actions button:hover {
            background: rgba(108,140,255,0.15);
            color: white;
        }
        .btn-add {
            background: #6c8cff;
            border: none;
            color: #0b0d10;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-add:hover { background: #7b9aff; transform: scale(1.02); }
        .login-form {
            max-width: 380px;
            margin: 80px auto;
            background: rgba(30,34,40,0.5);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.03);
        }
        .login-form input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            color: white;
            margin: 8px 0;
            outline: none;
        }
        .login-form input:focus { border-color: #6c8cff; }
        .login-form button {
            width: 100%;
            padding: 12px;
            background: #6c8cff;
            border: none;
            border-radius: 12px;
            color: #0b0d10;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="dashboard-container" id="dashboard">
    <!-- نموذج تسجيل الدخول -->
    <div id="loginForm" class="login-form">
        <h2 style="text-align:center; margin-bottom:20px;"><i class="fas fa-shield-alt" style="color:#6c8cff;"></i> تسجيل الدخول</h2>
        <input type="text" placeholder="اسم المستخدم" id="adminUser" value="admin" />
        <input type="password" placeholder="كلمة المرور" id="adminPass" value="hashim2026" />
        <button onclick="login()">دخول <i class="fas fa-arrow-right"></i></button>
        <p style="text-align:center; color:#a0a8b4; font-size:0.8rem; margin-top:12px;">admin / hashim2026</p>
    </div>

    <!-- لوحة التحكم -->
    <div id="adminPanel" class="hidden">
        <div class="admin-header">
            <h1><i class="fas fa-cog"></i> لوحة التحكم</h1>
            <span class="badge"><i class="fas fa-user"></i> المشرف</span>
        </div>

        <!-- الإحصائيات -->
        <div class="stats-grid">
            <div class="stat-card"><div class="number" id="totalApps">5</div><div class="label">التطبيقات</div></div>
            <div class="stat-card"><div class="number" id="totalDownloads">35.7k</div><div class="label">إجمالي التحميلات</div></div>
            <div class="stat-card"><div class="number" id="totalVisits">12.4k</div><div class="label">الزيارات</div></div>
            <div class="stat-card"><div class="number" id="lastUpdate">اليوم</div><div class="label">آخر تحديث</div></div>
        </div>

        <!-- إدارة التطبيقات -->
        <div class="admin-section">
            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;">
                <h2><i class="fas fa-list"></i> إدارة التطبيقات</h2>
                <button class="btn-add" onclick="alert('فتح نموذج إضافة تطبيق')"><i class="fas fa-plus"></i> إضافة تطبيق</button>
            </div>
            <div id="appList">
                <!-- يتم عرض التطبيقات بواسطة JavaScript -->
            </div>
        </div>

        <!-- زر الخروج -->
        <div style="text-align:center; margin-top:20px;">
            <button onclick="logout()" style="background:none; border:1px solid rgba(255,255,255,0.05); color:#a0a8b4; padding:8px 24px; border-radius:60px; cursor:pointer;">
                <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
            </button>
        </div>
    </div>
</div>

<script>
    // بيانات التطبيقات (نفس البيانات من apps.js)
    const adminApps = [
        { id: 1, name: 'Hashim Launcher', version: 'v3.2', downloads: 14800, icon: 'fa-rocket' },
        { id: 2, name: 'Hashim Notes', version: 'v1.0', downloads: 3200, icon: 'fa-pen-fancy' },
        { id: 3, name: 'Hashim Files', version: 'v2.1', downloads: 6700, icon: 'fa-folder-open' },
        { id: 4, name: 'Hashim Camera', version: 'v0.9', downloads: 2100, icon: 'fa-camera' },
        { id: 5, name: 'Hashim Weather', version: 'v2.0', downloads: 8900, icon: 'fa-cloud-sun' }
    ];

    function renderAdminApps() {
        const list = document.getElementById('appList');
        list.innerHTML = adminApps.map(app => `
            <div class="app-list-item">
                <div class="app-info">
                    <i class="fas ${app.icon}"></i>
                    <div>
                        <strong>${app.name}</strong>
                        <span style="color:#a0a8b4; font-size:0.8rem; margin-left:10px;">${app.version}</span>
                        <span style="color:#a0a8b4; font-size:0.75rem; margin-left:10px;">${app.downloads} تحميل</span>
                    </div>
                </div>
                <div class="app-actions">
                    <button onclick="alert('تعديل ${app.name}')"><i class="fas fa-edit"></i></button>
                    <button onclick="alert('حذف ${app.name}')" style="color:#ff6b6b;"><i class="fas fa-trash"></i></button>
                    <button onclick="alert('ترتيب ${app.name}')"><i class="fas fa-arrows-alt-v"></i></button>
                </div>
            </div>
        `).join('');
    }

    function login() {
        const user = document.getElementById('adminUser').value;
        const pass = document.getElementById('adminPass').value;
        if (user === 'admin' && pass === 'hashim2026') {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
            renderAdminApps();
            // تحديث الإحصائيات
            const total = adminApps.reduce((sum, a) => sum + a.downloads, 0);
            document.getElementById('totalDownloads').textContent = (total / 1000).toFixed(1) + 'k';
        } else {
            alert('❌ اسم المستخدم أو كلمة المرور غير صحيحة');
        }
    }

    function logout() {
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('adminPanel').classList.add('hidden');
    }

    // دعم Enter
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const loginForm = document.getElementById('loginForm');
            if (!loginForm.classList.contains('hidden')) {
                login();
            }
        }
    });

    // تحميل أولي
    renderAdminApps();
</script>
</body>
          </html>
